name: provision-repository

on:
  workflow_dispatch:
    inputs:
      repo_slug:
        description: 'Lowercase project slug; final repo name becomes proj-<repo_slug>'
        required: true
        type: string
      description:
        description: 'Repository description applied during provisioning'
        required: true
        type: string
      execution_mode:
        description: 'Internal operator/testing mode'
        required: false
        default: dry-run
        type: choice
        options:
          - dry-run
          - sandbox

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run provisioning action
        id: provision
        uses: ./.github/actions/provision-repository
        with:
          repo_slug: ${{ inputs.repo_slug }}
          description: ${{ inputs.description }}
          execution_mode: ${{ inputs.execution_mode }}
        env:
          PROVISIONING_GITHUB_APP_ID: ${{ secrets.PROVISIONING_GITHUB_APP_ID }}
          PROVISIONING_GITHUB_APP_INSTALLATION_ID: ${{ secrets.PROVISIONING_GITHUB_APP_INSTALLATION_ID }}
          PROVISIONING_GITHUB_APP_PRIVATE_KEY: ${{ secrets.PROVISIONING_GITHUB_APP_PRIVATE_KEY }}
          PROVISIONING_TEMPLATE_REPOSITORY: ${{ vars.PROVISIONING_TEMPLATE_REPOSITORY }}
          PROVISIONING_TEMPLATE_REPOSITORY_REF: ${{ vars.PROVISIONING_TEMPLATE_REPOSITORY_REF }}
          PROVISIONING_SANDBOX_OWNER: ${{ vars.PROVISIONING_SANDBOX_OWNER }}
          GITHUB_WORKFLOW_REF: .github/workflows/provision-repository.yml@${{ github.ref }}
